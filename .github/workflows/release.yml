name: Release

# Builds signed store artifacts. Trigger by pushing a version tag (e.g. v1.0.0)
# or manually from the Actions tab. See docs/RELEASE_PLAN.md §6.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

env:
  FLUTTER_VERSION: "3.44.4"

jobs:
  android:
    name: Android App Bundle (prod)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - run: flutter pub get

      # Reconstruct the keystore + key.properties from encrypted repo secrets.
      # Secrets: ANDROID_KEYSTORE_BASE64, ANDROID_KEY_ALIAS,
      # ANDROID_KEY_PASSWORD, ANDROID_STORE_PASSWORD (see RELEASE_PLAN §4).
      - name: Decode keystore
        if: ${{ env.ANDROID_KEYSTORE_BASE64 != '' }}
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/upload.jks"
          cat > android/key.properties <<EOF
          storePassword=${{ secrets.ANDROID_STORE_PASSWORD }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          storeFile=$RUNNER_TEMP/upload.jks
          EOF

      - name: Build App Bundle
        run: flutter build appbundle --flavor prod -t lib/main_prod.dart

      - uses: actions/upload-artifact@v4
        with:
          name: novaplay-release-aab
          path: build/app/outputs/bundle/prodRelease/*.aab
          if-no-files-found: error

  ios:
    name: iOS (no-codesign verify)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - run: flutter pub get

      # Compile-verifies the iOS target. Real signing + App Store upload run
      # through fastlane `deliver` with the distribution cert (RELEASE_PLAN §5).
      - name: Build iOS (no codesign)
        run: flutter build ios --flavor prod -t lib/main_prod.dart --no-codesign

  web:
    name: Web bundle
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter build web --release
      - uses: actions/upload-artifact@v4
        with:
          name: novaplay-web
          path: build/web
          if-no-files-found: error
