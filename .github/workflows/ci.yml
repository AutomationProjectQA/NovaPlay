name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Keep the Flutter version pinned to match local/dev (Sprint 5).
env:
  FLUTTER_VERSION: "3.44.4"

jobs:
  analyze-and-test:
    name: Analyze & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyze
        run: flutter analyze

      - name: Run tests
        run: flutter test --coverage

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/lcov.info
          if-no-files-found: ignore

  build-android:
    name: Build Android (dev)
    needs: analyze-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - run: flutter pub get

      # Builds the dev flavor. Add staging/prod with their signing configs and
      # google-services.json in a release workflow (docs/RELEASE_PLAN.md).
      - name: Build dev APK
        run: flutter build apk --flavor dev -t lib/main_dev.dart --debug
