name: novaplay
description: "NovaPlay — a cosmic physics puzzle. Light the constellations."
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

# The following defines the version and build number for your application.
# A version number is three numbers separated by dots, like 1.2.43
# followed by an optional build number separated by a +.
# Both the version and the builder number may be overridden in flutter
# build by specifying --build-name and --build-number, respectively.
# In Android, build-name is used as versionName while build-number used as versionCode.
# Read more about Android versioning at https://developer.android.com/studio/publish/versioning
# In iOS, build-name is used as CFBundleShortVersionString while build-number is used as CFBundleVersion.
# Read more about iOS versioning at
# https://developer.apple.com/library/archive/documentation/General/Reference/InfoPlistKeyReference/Articles/CoreFoundationKeys.html
# In Windows, build-name is used as the major, minor, and patch parts
# of the product and file versions while build-number is used as the build suffix.
version: 1.0.0+1

environment:
  sdk: ^3.12.2

# Dependencies specify other packages that your package needs in order to work.
# To automatically upgrade your package dependencies to the latest versions
# consider running `flutter pub upgrade --major-versions`. Alternatively,
# dependencies can be manually updated by changing the version numbers below to
# the latest version available on pub.dev. To see which dependencies have newer
# versions available, run `flutter pub outdated`.
dependencies:
  flutter:
    sdk: flutter

  cloud_firestore: ^6.6.0
  cupertino_icons: ^1.0.8
  easy_localization: ^3.0.8
  equatable: ^2.0.8
  firebase_analytics: ^12.4.3
  firebase_auth: ^6.5.4
  firebase_core: ^4.11.0
  firebase_crashlytics: ^5.2.4
  firebase_messaging: ^16.4.1
  firebase_remote_config: ^6.5.3
  flame: ^1.37.0
  flutter_riverpod: ^3.3.2
  freezed_annotation: ^3.1.0
  get_it: ^9.2.1
  go_router: ^17.3.0
  google_mobile_ads: ^9.0.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  in_app_purchase: ^3.3.0
  injectable: ^3.0.0
  json_annotation: ^4.12.0
  logger: ^2.7.0
  path_provider: ^2.1.6
  shared_preferences: ^2.5.5
  vector_math: ^2.2.0
  flame_audio: ^2.12.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  build_runner: ^2.15.0
  flutter_launcher_icons: ^0.14.4
  flutter_lints: ^6.0.0
  flutter_native_splash: ^2.4.8
  freezed: ^3.2.5
  injectable_generator: ^3.0.2
  json_serializable: ^6.14.0
  very_good_analysis: ^10.3.0

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:
  uses-material-design: true

  assets:
    - assets/translations/
    - assets/levels/
    - assets/levels/sector_01/
    - assets/levels/sector_02/
    - assets/levels/sector_03/
    - assets/levels/sector_04/
    - assets/levels/sector_05/
    - assets/images/
    - assets/audio/
    - assets/audio/music/
    - assets/audio/sfx/

  # Custom fonts are added in a later sprint (see docs/DESIGN_SYSTEM.md typography).
  # fonts:
  #   - family: Sora
  #     fonts:
  #       - asset: assets/fonts/Sora-Regular.ttf
  #       - asset: assets/fonts/Sora-SemiBold.ttf
  #         weight: 600

# ─── App icons (Sprint 5) ─── generate with: dart run flutter_launcher_icons
flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  image_path: "assets/images/app_icon.png"
  adaptive_icon_background: "#0A0C1A"
  adaptive_icon_foreground: "assets/images/app_icon_foreground.png"
  web:
    generate: true
    background_color: "#0A0C1A"
    theme_color: "#FFC857"

# ─── Native splash (Sprint 5) ─── generate with: dart run flutter_native_splash:create
flutter_native_splash:
  color: "#0A0C1A"
  image: assets/images/splash_logo.png
  android_12:
    color: "#0A0C1A"
    image: assets/images/splash_logo.png
  ios: true
  web: false
